var view="home",activeNeed=null,openCard=null,searchText="",filterGroup="All",filterDiff="All",filterBloom="All",filterDok="All";

function render(){
  var app=document.getElementById("app"),h="";
  h+='<div class="hdr"><div class="pre">Cooperative Learning</div><h1>Structure Toolkit</h1>';
  h+='<div class="sub">Interactive structures that get every student talking, thinking, and learning — not just the ones who raise their hands. No special training needed. Pick a goal, follow the steps.</div></div>';
  h+='<div class="tabs">';
  h+=tb("What do I need?","home")+tb("All Structures","all")+tb("Building Blocks","blocks")+tb("Getting Started","start")+tb("Discussion Tools","tools");
  h+='</div>';
  if(view==="home")h+=rHome();else if(view==="need")h+=rNeed();else if(view==="all")h+=rAll();else if(view==="blocks")h+=rBlocks();else if(view==="start")h+=rStart();else if(view==="tools")h+=rTools();
  h+='<div class="ftr">Cooperative Learning Structure Toolkit · Built by <a href="#">Jason Beyer</a>, Director of Educational Technology — Regis Jesuit High School</div>';
  app.innerHTML=h;bindEvents();
}

function tb(l,v){return '<button class="tab'+((view===v||(view==="need"&&v==="home"))?" a":"")+'" data-view="'+v+'">'+l+'</button>';}

function rHome(){
  var h='<div style="text-align:center;margin-bottom:16px"><div style="font-size:15px;font-weight:700;color:#eee">What do you need students to do?</div><div style="font-size:12px;color:#777;margin-top:4px">Pick a goal — we\'ll show you the right structures with step-by-step instructions.</div></div>';
  h+='<div class="needs">';
  for(var i=0;i<NEEDS.length;i++){var n=NEEDS[i];h+='<button class="need-btn" data-need="'+n.id+'"><div class="icon">'+n.icon+'</div><div class="label">'+n.label+'</div><div class="desc">'+n.desc+'</div></button>';}
  h+='</div>';return h;
}

function rNeed(){
  var need=NEEDS.filter(function(n){return n.id===activeNeed})[0];
  if(!need)return"";
  var st=S.filter(function(s){return s.need===activeNeed});
  var h='<button class="back-btn" data-view="home">← Back to needs</button>';
  h+='<div style="margin-bottom:16px"><span style="font-size:28px;margin-right:8px">'+need.icon+'</span><span style="font-size:20px;font-weight:700">'+need.label+'</span><div style="font-size:12px;color:#888;margin-top:4px">'+need.desc+' · '+st.length+' structures</div></div>';
  for(var i=0;i<st.length;i++)h+=rCard(st[i]);
  return h;
}

function rAll(){
  var h='<div class="search-wrap"><input type="text" id="si" placeholder="Search structures, uses, or keywords…" value="'+esc(searchText)+'"></div>';
  h+='<div class="filters"><select id="fg"><option value="All">All Groupings</option><option value="Pairs"'+(filterGroup==="Pairs"?" selected":"")+'>Pairs</option><option value="Team"'+(filterGroup==="Team"?" selected":"")+'>Team of 4</option><option value="Class"'+(filterGroup==="Class"?" selected":"")+'>Whole Class</option></select>';
  h+='<select id="fd"><option value="All">All Levels</option><option value="Beginner"'+(filterDiff==="Beginner"?" selected":"")+'>Beginner</option><option value="Intermediate"'+(filterDiff==="Intermediate"?" selected":"")+'>Intermediate</option><option value="Advanced"'+(filterDiff==="Advanced"?" selected":"")+'>Advanced</option></select>';
  h+='<select id="fb"><option value="All">All Bloom\'s</option><option value="Remember"'+(filterBloom==="Remember"?" selected":"")+'>Remember</option><option value="Understand"'+(filterBloom==="Understand"?" selected":"")+'>Understand</option><option value="Apply"'+(filterBloom==="Apply"?" selected":"")+'>Apply</option><option value="Analyze"'+(filterBloom==="Analyze"?" selected":"")+'>Analyze</option><option value="Evaluate"'+(filterBloom==="Evaluate"?" selected":"")+'>Evaluate</option><option value="Create"'+(filterBloom==="Create"?" selected":"")+'>Create</option></select>';
  h+='<select id="fk"><option value="All">All DOK</option><option value="1"'+(filterDok==="1"?" selected":"")+'>DOK 1 — Recall</option><option value="2"'+(filterDok==="2"?" selected":"")+'>DOK 2 — Skill/Concept</option><option value="3"'+(filterDok==="3"?" selected":"")+'>DOK 3 — Strategic</option><option value="4"'+(filterDok==="4"?" selected":"")+'>DOK 4 — Extended</option></select>';
  h+='</div>';
  var f=S.filter(function(s){if(filterGroup!=="All"&&s.group!==filterGroup)return false;if(filterDiff!=="All"&&s.diff!==filterDiff)return false;if(filterBloom!=="All"&&(!s.bloom||s.bloom.indexOf(filterBloom)===-1))return false;if(filterDok!=="All"&&(!s.dok||s.dok.indexOf(parseInt(filterDok))===-1))return false;if(searchText){var q=searchText.toLowerCase();if(s.name.toLowerCase().indexOf(q)===-1&&s.best.toLowerCase().indexOf(q)===-1&&s.how.toLowerCase().indexOf(q)===-1&&s.engine.toLowerCase().indexOf(q)===-1)return false;}return true;});
  h+='<div class="count">'+f.length+' structure'+(f.length!==1?'s':'')+'</div>';
  for(var i=0;i<f.length;i++)h+=rCard(f[i]);return h;
}

function rCard(s){
  var isOpen=openCard===s.name;
  var h='<div class="card s-card'+(isOpen?" card-open":"")+'" data-structure="'+s.name+'">';
  h+='<div class="s-hdr"><div class="s-name">'+s.name+'<span class="arrow'+(isOpen?" open":"")+'">▸</span></div></div>';
  h+='<div class="s-badges">';
  h+='<span class="badge b-group">'+(s.group==="Pairs"?"👫 Pairs":s.group==="Team"?"👥 Team of 4":"🏫 Whole Class")+'</span>';
  h+='<span class="badge b-time">⏱ '+s.time+'</span>';
  h+='<span class="badge b-diff">'+s.diff+'</span>';
  if(s.move)h+='<span class="badge b-move">🚶 Movement</span>';
  h+='<span class="badge b-engine">'+s.engine+'</span>';
  if(s.bloom)h+='<span class="badge b-bloom">Bloom\'s: '+s.bloom.join(", ")+'</span>';
  if(s.dok)h+='<span class="badge b-dok">DOK '+s.dok.join("–")+'</span>';
  h+='</div>';
  h+='<div class="s-how">'+s.how+'</div>';
  h+='<div class="s-best"><strong>Best for:</strong> '+s.best+'</div>';
  if(isOpen){
    h+='<div class="steps"><div class="step-label">Step-by-Step</div>';
    for(var j=0;j<s.steps.length;j++)h+='<div class="step"><div class="step-num">'+(j+1)+'</div><div class="step-text">'+s.steps[j]+'</div></div>';
    h+='<div class="tip-box"><div class="tip-label">💡 Teacher Tip</div><p>'+s.tips+'</p></div>';
    h+='<div class="example-box"><div class="ex-label">Example in Action</div><p>'+s.example+'</p></div></div>';
  }
  h+='</div>';return h;
}

// ========== BUILDING BLOCKS ==========
function rBlocks(){
  var h='<div class="gs-section"><div class="gs-title">The Three Engines</div>';
  h+='<div class="gs-text" style="margin-bottom:12px">Every cooperative learning structure is built from just <strong>three interaction patterns</strong>. Learn these, and you can understand — or invent — any structure.</div>';
  h+='<div class="engine-grid">';
  h+='<div class="engine-card"><h3>Volley</h3><div class="pattern">A → B → A → B</div><p>Back-and-forth between <strong>two people</strong>. Like a ping-pong rally. Partners alternate, one contribution at a time. Fast, focused, equal.</p></div>';
  h+='<div class="engine-card"><h3>Go-Around</h3><div class="pattern">A → B → C → D → A</div><p>Sequential turn-taking around a <strong>team of 3+</strong>. Each person contributes in order. Guarantees airtime for every voice, including the quiet ones.</p></div>';
  h+='<div class="engine-card"><h3>Mix</h3><div class="pattern">→ ? → ? → ?</div><p><strong>Movement</strong> to find new partners. Students leave their seats, pair with different classmates, interact, then find someone new. Breaks social bubbles.</p></div>';
  h+='</div></div>';

  h+='<div class="gs-section"><div class="gs-title">The Modes</div>';
  h+='<div class="gs-text" style="margin-bottom:12px">Each engine can run in different <strong>modes</strong> — how students interact within the pattern. Combine an engine with a mode and you have a structure.</div>';
  h+='<table class="mode-table"><thead><tr><th>Mode</th><th>What Students Do</th><th>When to Use</th></tr></thead><tbody>';
  h+='<tr><td>Verbal</td><td>Speak their response aloud</td><td>Quick, low-prep, good for brainstorming and recall</td></tr>';
  h+='<tr><td>Written</td><td>Write their response on paper</td><td>When you need a product, or the room is too noisy for verbal</td></tr>';
  h+='<tr><td>Coach</td><td>One solves, one watches and helps</td><td>Skill practice — math, writing mechanics, procedures</td></tr>';
  h+='<tr><td>Timed</td><td>One speaks for a set time, the other just listens</td><td>Reflection, deep sharing, opinion-forming</td></tr>';
  h+='<tr><td>Silent</td><td>Write without speaking (ideas go to center)</td><td>Equalizing voice, giving introverts full access</td></tr>';
  h+='<tr><td>Role-Based</td><td>Each person has a specific job (reader, responder, coach)</td><td>Complex tasks, structured practice, discussion</td></tr>';
  h+='</tbody></table></div>';

  h+='<div class="gs-section"><div class="gs-title">How Structures Stack</div>';
  h+='<div class="gs-text" style="margin-bottom:12px">Simple structures combine into more complex ones, just like chords combine into songs. Here\'s how the progression works:</div>';

  h+='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#9b59b6;margin-bottom:6px">Level 1: Pair Structures</div>';
  h+='<div style="font-size:12px;color:#bbb;line-height:1.7">Start here. Two students, one interaction pattern. <strong>Ping-Pong Share</strong> (Volley + Verbal), <strong>Listen & Switch</strong> (Volley + Timed), <strong>Partner Coach</strong> (Volley + Coach). Every teacher can run these on day one.</div></div>';

  h+='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#9b59b6;margin-bottom:6px">Level 2: Team Structures (building on pairs)</div>';
  h+='<div style="font-size:12px;color:#bbb;line-height:1.7">Expand from 2 to 4. <strong>Go-Around Share</strong> is just Ping-Pong Share extended to a team. <strong>Pass the Pen</strong> is the written version. <strong>Heads Up</strong> adds accountability by randomly calling one student to represent the team. Pairs within teams can still use Level 1 structures.</div></div>';

  h+='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#9b59b6;margin-bottom:6px">Level 3: Whole-Class Structures (building on pairs & teams)</div>';
  h+='<div style="font-size:12px;color:#bbb;line-height:1.7">Add movement. <strong>Stand & Find</strong> is Ping-Pong Share with new random partners each round. <strong>Card Swap</strong> adds question cards and trading. <strong>Double Ring</strong> rotates through many partners quickly. The engine is the same — just the scope changes.</div></div>';

  h+='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#9b59b6;margin-bottom:6px">Level 4: Combined & Sequenced Structures</div>';
  h+='<div style="font-size:12px;color:#bbb;line-height:1.7">Chain structures together. <strong>Snowball Build</strong> is Individual → Pair → Team (three structures in sequence). <strong>Interview Relay</strong> is two Volley interviews followed by a Go-Around share. <strong>Teach-Back Puzzle</strong> is individual study → expert Go-Around → team teaching. Once you see the engines, you can design your own sequences.</div></div>';
  h+='</div>';

  h+='<div class="gs-section"><div class="gs-title">Design Your Own</div>';
  h+='<div class="gs-text">Pick an engine. Pick a mode. You have a structure. Want students to brainstorm in pairs? <strong>Volley + Verbal</strong>. Want accountability in teams? <strong>Go-Around + Written + Consensus Check</strong>. Want energy and movement? <strong>Mix + Quiz</strong>. The structures in this toolkit aren\'t magic formulas — they\'re just well-tested combinations of these building blocks. Once you internalize the engines, you\'ll start inventing your own.</div></div>';

  h+='<div class="gs-section"><div class="gs-title">Thinking Levels: Bloom\'s Taxonomy & DOK</div>';
  h+='<div class="gs-text" style="margin-bottom:12px">Each structure in this toolkit is tagged with its <strong>Bloom\'s Taxonomy</strong> range and <strong>Webb\'s Depth of Knowledge (DOK)</strong> level. But here\'s the critical insight: <strong>the structure creates the interaction pattern; the prompt determines the cognitive demand.</strong> A Go-Around Share is DOK 1 if you ask "list the state capitals" and DOK 3 if you ask "name factors that could destabilize a democracy." Choose your structure for the interaction you want, then write your prompt for the thinking level you need.</div>';

  h+='<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#e67e22;margin-bottom:8px">Bloom\'s Taxonomy (Revised) — from simple to complex</div>';
  h+='<table class="mode-table"><tbody>';
  h+='<tr><td style="color:#27ae60">Remember</td><td>Recall facts, terms, definitions</td><td style="color:#777;font-size:11px">Ping-Pong Share, Card Swap, Reveal Together</td></tr>';
  h+='<tr><td style="color:#2ecc71">Understand</td><td>Explain, interpret, summarize, paraphrase</td><td style="color:#777;font-size:11px">Listen & Switch, Go-Around Share, Interview Relay</td></tr>';
  h+='<tr><td style="color:#3498db">Apply</td><td>Use knowledge in new situations, solve, demonstrate</td><td style="color:#777;font-size:11px">Partner Coach, Pair & Verify, Expert Hunt</td></tr>';
  h+='<tr><td style="color:#9b59b6">Analyze</td><td>Break apart, compare, contrast, find patterns</td><td style="color:#777;font-size:11px">Compare & Combine, Perspective Swap, Spot the Bluff</td></tr>';
  h+='<tr><td style="color:#e74c3c">Evaluate</td><td>Justify, argue, critique, judge, defend</td><td style="color:#777;font-size:11px">Opinion Line, Gallery Walk Feedback, Budget Vote, Fishbowl Focus</td></tr>';
  h+='<tr><td style="color:#C11430">Create</td><td>Design, produce, invent, compose</td><td style="color:#777;font-size:11px">Problem Swap, Snowball Build</td></tr>';
  h+='</tbody></table></div>';

  h+='<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#95a5a6;margin-bottom:8px">Webb\'s Depth of Knowledge — how deep does the thinking go?</div>';
  h+='<table class="mode-table"><tbody>';
  h+='<tr><td>DOK 1</td><td><strong>Recall & Reproduce</strong> — Right there. One correct answer. Retrieval from memory.</td><td style="color:#777;font-size:11px">Card Swap, Reveal Together, Ping-Pong Share (with recall prompts)</td></tr>';
  h+='<tr><td>DOK 2</td><td><strong>Skill & Concept</strong> — Requires some mental processing. Classify, compare, organize, interpret. More than one step.</td><td style="color:#777;font-size:11px">Partner Coach, Heads Up, Expert Hunt, Stand & Find</td></tr>';
  h+='<tr><td>DOK 3</td><td><strong>Strategic Thinking</strong> — Requires reasoning, planning, justifying. Multiple valid approaches. Students must develop an argument or strategy.</td><td style="color:#777;font-size:11px">Opinion Line, Perspective Swap, Compare & Combine, Role Rotate Discussion</td></tr>';
  h+='<tr><td>DOK 4</td><td><strong>Extended Thinking</strong> — Investigate over time. Synthesize across sources. Connect to the real world. Create something original.</td><td style="color:#777;font-size:11px">Snowball Build, Teach-Back Puzzle, Fishbowl Focus</td></tr>';
  h+='</tbody></table></div>';

  h+='<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#C11430;margin-bottom:8px">The Prompt Is the Lever</div>';
  h+='<div style="font-size:12px;color:#bbb;line-height:1.7;margin-bottom:8px">The same structure operates at radically different cognitive levels depending on your prompt. Here\'s the same structure — <strong>Go-Around Share</strong> — at each Bloom\'s level:</div>';
  h+='<table class="mode-table"><tbody>';
  h+='<tr><td style="color:#27ae60">Remember</td><td>"Go around and name one element from the periodic table."</td></tr>';
  h+='<tr><td style="color:#2ecc71">Understand</td><td>"Go around and explain one cause of the French Revolution in your own words."</td></tr>';
  h+='<tr><td style="color:#3498db">Apply</td><td>"Go around and give an example of this formula used in a real-world context."</td></tr>';
  h+='<tr><td style="color:#9b59b6">Analyze</td><td>"Go around: each person names one similarity OR difference between the two texts."</td></tr>';
  h+='<tr><td style="color:#e74c3c">Evaluate</td><td>"Go around and argue whether the protagonist made the right decision — and why."</td></tr>';
  h+='<tr><td style="color:#C11430">Create</td><td>"Go around: each person contributes one line to an original poem about migration."</td></tr>';
  h+='</tbody></table>';
  h+='<div style="font-size:11px;color:#888;margin-top:8px;font-style:italic">Same structure. Same steps. Six completely different levels of thinking. The structure is the vehicle; the prompt is the destination.</div></div>';

  h+='</div>';

  return h;
}

// ========== GETTING STARTED ==========
function rStart(){
  var h='';
  h+='<div class="gs-section"><div class="gs-title">The Core Idea</div><div class="gs-text">A <strong>structure</strong> is a step-by-step way of organizing how students interact with each other and with content. Structures are content-free — you plug in your own material. The same structure works in math, English, science, or history. Learn the structure once, use it everywhere.</div></div>';

  h+='<div class="gs-section"><div class="gs-title">The Formula</div><div class="card" style="text-align:center;padding:20px"><div style="font-size:18px;font-weight:800;color:#eee"><span style="color:#C11430">Content</span> + <span style="color:#3498db">Structure</span> = <span style="color:#2ecc71">Activity</span></div><div style="font-size:12px;color:#888;margin-top:6px">(What you teach) + (How students interact) = (A learning experience)</div><div style="font-size:12px;color:#666;margin-top:8px">Activity + Activity + Activity = <strong style="color:#eee">Lesson</strong></div></div></div>';

  h+='<div class="gs-section"><div class="gs-title">The Four Principles (PIES)</div><div class="gs-text" style="margin-bottom:10px">These are what separate structured cooperative learning from regular group work. If these are in place, the approach works. If not, you\'re just doing group work and hoping for the best.</div>';
  h+='<div class="pies-grid">';
  h+=pC("P","Positive Interdependence","Does the success of one benefit others?","Students share a common goal. Teammates help each other because everyone's success is linked.");
  h+=pC("I","Individual Accountability","Can each student be called on?","Each student must demonstrate understanding. No hiding behind the group. Structures make this visible.");
  h+=pC("E","Equal Participation","How equal is the participation?","Turn-taking, timed sharing, and roles ensure no one dominates and no one disappears.");
  h+=pC("S","Simultaneous Interaction","What percent are active at once?","Pairs = 50% active. Teams = 25%. Compare that to calling on one student = 3%. More active = more learning.");
  h+='</div></div>';

  h+='<div class="gs-section"><div class="gs-title">Setting Up Teams</div><div class="gs-text"><strong>Teams of 4</strong> are ideal — small enough for everyone to participate, and they split cleanly into pairs. Form <strong>mixed-ability teams</strong>: rank students into four performance quartiles (top 25%, next 25%, next 25%, bottom 25%), then place one from each quartile on every team. Within the team, seat students so <strong>partners sitting side by side are two quartiles apart</strong> — that\'s the productive gap for peer coaching. Keep teams together for <strong>5–6 weeks</strong>, then reshuffle.</div></div>';

  h+='<div class="gs-section"><div class="gs-title">Start with These Five</div><div class="gs-text" style="margin-bottom:10px">New to this? These five structures are the simplest, require no materials, and work in every subject.</div>';
  var starters=["Ping-Pong Share","Listen & Switch","Reflect-Discuss-Share","Go-Around Share","Heads Up"];
  for(var i=0;i<starters.length;i++){var s=S.filter(function(x){return x.name===starters[i]})[0];if(s)h+=rCard(s);}
  h+='</div>';

  h+='<div class="gs-section"><div class="gs-title">Management Essentials</div>';
  h+=mT("Quiet Signal","Establish one consistent signal (raised hand, chime, call-and-response). When you give it, students stop talking, stop working, and look at you. Practice until it takes less than 5 seconds.");
  h+=mT("12-Inch Voices","Teach students to talk at a volume that only reaches their partner or team — about 12 inches. Name it. Practice it. Reinforce it.");
  h+=mT("Sponge Activities","Have self-directed activities ready for early finishers: brainteasers, journal prompts, extension problems. Easy in, easy out, high success rate.");
  h+=mT("Three Before Me","If a student has a question, they ask their teammates first. Only if the whole team is stuck do they come to you. This reduces dependency and builds team problem-solving.");
  h+=mT("Structures Replace, Not Add","These don't take extra time — they replace traditional methods. A Listen & Switch takes the same minutes as calling on three students, but engages 100% of the class instead of 10%.");
  h+='</div>';
  return h;
}

function pC(l,n,q,d){return '<div class="pies-card"><div class="pies-letter">'+l+'</div><div class="pies-name">'+n+'</div><div class="pies-q">'+q+'</div><div class="pies-desc">'+d+'</div></div>';}
function mT(t,d){return '<div class="card" style="margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:#eee;margin-bottom:4px">'+t+'</div><div style="font-size:12px;color:#999;line-height:1.6">'+d+'</div></div>';}

// ========== TOOLS ==========
function rTools(){
  var h='<div class="gs-section"><div class="gs-title">Discussion Gambits</div><div class="gs-text" style="margin-bottom:10px">Sentence starters that teach students the mechanics of academic discourse. Post in your classroom, print on cards, or project on screen.</div>';
  var G=[{t:"Agreeing",i:["I agree with you because…","That's a great point because…","I see what you mean…","Building on what you said…"]},{t:"Respectfully Disagreeing",i:["I see it differently because…","I respectfully disagree because…","Have you considered…?","Another way to look at it is…"]},{t:"Paraphrasing",i:["So what you're saying is…","In other words…","Let me make sure I understand…","It sounds like you think…"]},{t:"Adding On",i:["Building on that idea…","To add to what you said…","That reminds me of…","Along those lines…"]},{t:"Encouraging Others",i:["What do you think?","Tell me more about that…","That's interesting — go on…","I'd love to hear your idea…"]},{t:"Asking for Clarification",i:["Can you explain what you mean by…?","Could you give an example?","I'm not sure I follow — can you say more?","What makes you think that?"]}];
  for(var i=0;i<G.length;i++){h+='<div class="gambit-section"><div class="gambit-type">'+G[i].t+'</div>';for(var j=0;j<G[i].i.length;j++)h+='<div class="gambit">"'+G[i].i[j]+'"</div>';h+='</div>';}
  h+='</div>';

  h+='<div class="gs-section"><div class="gs-title">Sponge Activities</div><div class="gs-text" style="margin-bottom:10px">Self-directed activities for teams that finish early. Characteristics: easy entry, easy exit, high success rate, fun, connected to learning.</div>';
  var sp=["Puzzles and mazes (with or without words)","Brainteasers and logic puzzles","Letter matrix — how many words can you find?","How many words can you make from [a long word]?","Task cards related to current content","Game corner: chess, checkers, dominoes","Extensions to the current lesson or unit","Journal or log entries — reflective writing","List all the ways to make the number [X]","Brainstorming challenges (things made from rubber, uses for a paperclip)","How many ways can you make one dollar?","Create quiz questions for classmates"];
  h+='<div class="card">';for(var i=0;i<sp.length;i++)h+='<div style="font-size:12px;color:#bbb;padding:5px 0;border-bottom:'+(i<sp.length-1?"1px solid rgba(255,255,255,.04)":"none")+'">'+sp[i]+'</div>';
  h+='</div></div>';

  h+='<div class="gs-section"><div class="gs-title">Sample Prompts by Subject</div>';
  var P={"Teambuilding (any subject)":["What's something most people don't know about you?","If you could have any superpower for one day…","Describe your ideal weekend in three words.","What's a skill you'd love to learn?","If you could time-travel, where and when?","What's the best advice you've ever received?"],Science:["Name three renewable energy sources.","Explain the water cycle in your own words.","What variables would you test in this experiment?","Predict what would happen if…","Design an experiment to test this hypothesis."],Humanities:["What is the author's purpose in this passage?","Compare two perspectives on this event.","What would you have done differently?","How does this connect to current events?","Summarize the main argument in one sentence."],Math:["Explain your solution strategy.","What's a common mistake someone might make here?","Create a word problem using today's concept.","Is there another way to solve this?","Estimate the answer before solving."],"World Languages":["Describe your morning using at least 5 verbs.","Create a dialogue at a restaurant.","Find cognates in this text.","Use three new vocabulary words in a sentence.","Describe this image using only the target language."]};
  for(var k in P){h+='<div class="card" style="margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:#C11430;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">'+k+'</div>';for(var i=0;i<P[k].length;i++)h+='<div style="font-size:12px;color:#bbb;padding:4px 0;border-bottom:'+(i<P[k].length-1?"1px solid rgba(255,255,255,.04)":"none")+'">'+P[k][i]+'</div>';h+='</div>';}
  h+='</div>';
  return h;
}

// ========== EVENTS ==========
function bindEvents(){
  var els=document.querySelectorAll("[data-view]");for(var i=0;i<els.length;i++)els[i].addEventListener("click",function(){var v=this.getAttribute("data-view");if(v){view=v;openCard=null;searchText="";filterGroup="All";filterDiff="All";filterBloom="All";filterDok="All";render();}});
  var nbs=document.querySelectorAll(".need-btn");for(var i=0;i<nbs.length;i++)nbs[i].addEventListener("click",function(){activeNeed=this.getAttribute("data-need");view="need";openCard=null;render();});
  var scs=document.querySelectorAll(".s-card");for(var i=0;i<scs.length;i++)scs[i].addEventListener("click",function(){var n=this.getAttribute("data-structure");openCard=openCard===n?null:n;render();});
  var si=document.getElementById("si");if(si){si.addEventListener("input",function(){searchText=this.value;render();var el=document.getElementById("si");if(el){el.focus();el.setSelectionRange(searchText.length,searchText.length);}});}
  var fg=document.getElementById("fg");if(fg)fg.addEventListener("change",function(){filterGroup=this.value;render();});
  var fd=document.getElementById("fd");if(fd)fd.addEventListener("change",function(){filterDiff=this.value;render();});
  var fb=document.getElementById("fb");if(fb)fb.addEventListener("change",function(){filterBloom=this.value;render();});
  var fk=document.getElementById("fk");if(fk)fk.addEventListener("change",function(){filterDok=this.value;render();});
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

document.getElementById("themeBtn").addEventListener("click",function(){document.body.classList.toggle("light");this.textContent=document.body.classList.contains("light")?"🌙 Dark":"☀ Light";try{localStorage.setItem("clt_theme",document.body.classList.contains("light")?"light":"dark")}catch(e){}});
try{if(localStorage.getItem("clt_theme")==="light"){document.body.classList.add("light");document.getElementById("themeBtn").textContent="🌙 Dark";}}catch(e){}

render();
})();
